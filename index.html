<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Duran's General Mechanic | Greenville, TX
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #080808;
      --dark:   #0d0d0d;
      --card:   #121212;
      --border: #1e1e1e;
      --red:    #c0392b;
      --red2:   #e74c3c;
      --silver: #b0b8c1;
      --white:  #f2f0eb;
      --muted:  #686868;
      --font-d: 'Rajdhani', sans-serif;
      --font-c: 'Barlow Condensed', sans-serif;
      --font-b: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-b);
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* GRAIN */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: .5;
    }

    /* ── LANGUAGE TOGGLE BAR ── */
    .lang-bar {
      background: var(--red);
      display: flex; justify-content: flex-end; align-items: center;
      padding: .35rem 5%; gap: .6rem;
      position: relative; z-index: 600;
    }
    .lang-label {
      font-size: .68rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: rgba(255,255,255,.7);
    }
    .lang-toggle {
      display: flex; gap: 2px;
      background: rgba(0,0,0,.25);
      padding: 2px; border-radius: 2px;
    }
    .lang-btn {
      font-family: var(--font-d);
      font-size: .72rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      padding: .22rem .75rem;
      border: none; cursor: pointer;
      background: transparent; color: rgba(255,255,255,.55);
      transition: background .2s, color .2s;
    }
    .lang-btn.active {
      background: var(--white); color: var(--red);
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 32px; left: 0; right: 0; z-index: 500;
      display: flex; align-items: center; justify-content: space-between;
      padding: .95rem 5%;
      background: rgba(8,8,8,.93);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { text-decoration: none; }
    .nav-logo-main {
      font-family: var(--font-d);
      font-size: 1.3rem; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--white); line-height: 1;
    }
    .nav-logo-main span { color: var(--red); }
    .nav-logo-sub {
      font-size: .55rem; font-weight: 600;
      letter-spacing: .16em; text-transform: uppercase;
      color: var(--muted);
    }
    .nav-links { display: flex; gap: 1.8rem; list-style: none; }
    .nav-links a {
      color: var(--muted); text-decoration: none;
      font-size: .75rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-phone {
      display: flex; align-items: center; gap: .5rem;
      font-family: var(--font-d); font-weight: 700;
      font-size: .95rem; letter-spacing: .06em;
      color: var(--red); text-decoration: none;
      transition: color .2s;
    }
    .nav-phone:hover { color: var(--red2); }
    .nav-phone::before { content: ''; font-size: .75rem; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: grid; grid-template-columns: 1.1fr 1fr;
      position: relative; overflow: hidden;
    }
    .hero-left {
      display: flex; flex-direction: column; justify-content: center;
      padding: 11rem 4% 5rem 7%;
      position: relative; z-index: 2;
    }
    .hero-right {
      position: relative; overflow: hidden;
    }
    .hero-right::before {
      content: '';
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to right, var(--black) 0%, transparent 35%),
                  linear-gradient(to top, var(--black) 0%, transparent 20%);
    }
    .hero-right-fill {
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 85% 90% at 60% 50%, rgba(192,57,43,.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 85% 85%, rgba(176,184,193,.03) 0%, transparent 50%);
    }
    /* Speed lines */
    .hero-lines {
      position: absolute; inset: 0; z-index: 0;
      background-image: repeating-linear-gradient(
        -8deg,
        transparent 0px, transparent 40px,
        rgba(192,57,43,.03) 40px, rgba(192,57,43,.03) 41px
      );
    }
    .hero-bg-word {
      position: absolute; bottom: -5%; right: -3%;
      font-family: var(--font-d);
      font-size: 18vw; font-weight: 700;
      color: rgba(192,57,43,.04);
      text-transform: uppercase; letter-spacing: -.02em;
      pointer-events: none; z-index: 0; line-height: 1;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: .6rem;
      font-family: var(--font-c);
      font-size: .8rem; font-weight: 600;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--red); margin-bottom: 1.2rem;
      animation: fadeUp .55s ease both;
    }
    .hero-eyebrow::before { content: ''; width: 25px; height: 2px; background: var(--red); }

    .hero-title {
      font-family: var(--font-d);
      font-size: clamp(3.8rem, 7.5vw, 7.5rem);
      font-weight: 700; line-height: .92;
      text-transform: uppercase; letter-spacing: .01em;
      animation: fadeUp .65s .08s ease both;
    }
    .hero-title .accent { color: var(--red); display: block; }
    .hero-title .outline {
      display: block;
      -webkit-text-stroke: 1.5px var(--silver);
      color: transparent;
      font-size: clamp(2rem, 4vw, 4rem);
      letter-spacing: .08em;
    }

    .hero-guarantee {
      display: inline-flex; align-items: center; gap: .6rem;
      margin-top: 1.6rem;
      background: rgba(192,57,43,.1);
      border: 1px solid rgba(192,57,43,.25);
      padding: .45rem 1rem;
      font-family: var(--font-c);
      font-size: .8rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--red);
      animation: fadeUp .65s .16s ease both;
    }
    .hero-guarantee::before { content: ''; }

    .hero-sub {
      margin-top: 1.4rem;
      font-size: .98rem; font-weight: 300; color: var(--muted);
      max-width: 420px; line-height: 1.75;
      animation: fadeUp .65s .22s ease both;
    }

    .hero-actions {
      margin-top: 2.2rem; display: flex; gap: 1rem; flex-wrap: wrap;
      animation: fadeUp .65s .3s ease both;
    }
    .btn-primary {
      background: var(--red); color: var(--white);
      padding: .88rem 2rem; font-weight: 700; font-size: .88rem;
      letter-spacing: .08em; text-transform: uppercase;
      border: none; cursor: pointer; text-decoration: none;
      display: inline-block; font-family: var(--font-b);
      transition: background .2s, transform .15s, box-shadow .2s;
    }
    .btn-primary:hover { background: var(--red2); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(192,57,43,.3); }
    .btn-ghost {
      background: transparent; color: var(--white);
      padding: .88rem 2rem; font-weight: 500; font-size: .88rem;
      letter-spacing: .08em; text-transform: uppercase;
      border: 1px solid var(--border); cursor: pointer;
      text-decoration: none; display: inline-block; font-family: var(--font-b);
      transition: border-color .2s, color .2s;
    }
    .btn-ghost:hover { border-color: var(--red); color: var(--red); }

    .hero-stats {
      margin-top: 3rem; display: flex; gap: 2.5rem; flex-wrap: wrap;
      animation: fadeUp .65s .38s ease both;
    }
    .stat { border-left: 2px solid var(--red); padding-left: .9rem; }
    .stat-num {
      font-family: var(--font-d); font-size: 2rem;
      font-weight: 700; line-height: 1; color: var(--white);
    }
    .stat-num span { color: var(--red); }
    .stat-label {
      font-size: .65rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-top: .15rem;
    }

    /* ── MARQUEE ── */
    .marquee-wrap { background: var(--red); overflow: hidden; padding: .62rem 0; }
    .marquee-track { display: flex; white-space: nowrap; animation: marquee 22s linear infinite; }
    .marquee-item {
      font-family: var(--font-c); font-size: .88rem; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--white); padding: 0 2rem; flex-shrink: 0;
    }
    .marquee-item::after { content: '•'; margin-left: 2rem; opacity: .5; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* ── SECTIONS ── */
    section { padding: 5.5rem 5%; }
    .section-eyebrow {
      display: inline-flex; align-items: center; gap: .6rem;
      font-family: var(--font-c); font-size: .72rem; font-weight: 600;
      letter-spacing: .18em; text-transform: uppercase;
      color: var(--red); margin-bottom: .7rem;
    }
    .section-eyebrow::before { content: ''; width: 18px; height: 2px; background: var(--red); }
    .section-title {
      font-family: var(--font-d); font-size: clamp(2.2rem, 4vw, 3.5rem);
      font-weight: 700; text-transform: uppercase; line-height: 1; letter-spacing: .03em;
    }
    .section-sub {
      color: var(--muted); font-size: .93rem; font-weight: 300;
      max-width: 490px; margin-top: .7rem; line-height: 1.7;
    }

    /* ── SERVICES ── */
    #services { background: var(--dark); }
    .services-header { margin-bottom: 3rem; }
    .services-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(255px, 1fr));
      gap: 1px; background: var(--border);
    }
    .svc-card {
      background: var(--card); padding: 2rem 1.8rem;
      position: relative; overflow: hidden; transition: background .2s;
    }
    .svc-card::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 100%; height: 2px;
      background: linear-gradient(to right, var(--red), var(--red2));
      transition: right .35s ease;
    }
    .svc-card:hover::after { right: 0; }
    .svc-card:hover { background: #181818; }
    .svc-icon { font-size: 1.7rem; margin-bottom: .9rem; display: block; }
    .svc-title {
      font-family: var(--font-c); font-size: 1.25rem; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase; margin-bottom: .2rem;
    }
    .svc-title-es {
      font-family: var(--font-c); font-size: .9rem; font-weight: 400;
      letter-spacing: .04em; color: var(--red); margin-bottom: .5rem;
      font-style: italic;
    }
    .svc-desc { color: var(--muted); font-size: .86rem; line-height: 1.7; }

    /* ── GALLERY ── */
    #work { background: var(--black); }
    .gallery-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 210px; gap: 3px; margin-top: 2.5rem;
    }
    .gallery-item { overflow: hidden; position: relative; background: var(--card); }
    .gallery-item.wide { grid-column: span 2; }
    .gallery-item img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .5s ease, filter .4s ease;
      filter: brightness(.8) saturate(.85);
    }
    .gallery-item:hover img { transform: scale(1.06); filter: brightness(1) saturate(1.1); }
    .gallery-ph {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: .4rem;
      font-size: .68rem; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; color: #222;
    }
    .gallery-ph span:first-child { font-size: 1.6rem; opacity: .15; }
    .gallery-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: .65rem .9rem;
      background: linear-gradient(transparent, rgba(0,0,0,.82));
      font-size: .68rem; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: rgba(255,255,255,.82);
      opacity: 0; transition: opacity .3s;
    }
    .gallery-item:hover .gallery-caption { opacity: 1; }
    .gallery-caption a { color: inherit; text-decoration: underline; text-underline-offset: 2px; }

    /* ── TESTIMONIALS ── */
    #testimonials { background: var(--dark); }
    .testimonials-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(295px, 1fr));
      gap: 1.2rem; margin-top: 2.8rem;
    }
    .t-card {
      background: var(--card); border: 1px solid var(--border);
      padding: 1.8rem; transition: border-color .2s, transform .2s;
    }
    .t-card:hover { border-color: rgba(192,57,43,.4); transform: translateY(-3px); }
    .t-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .9rem; }
    .t-stars { color: var(--red); font-size: .9rem; letter-spacing: .08em; }
    .t-source { font-size: .62rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .t-quote { font-family: Georgia, serif; font-size: 2.8rem; color: var(--red); line-height: .5; opacity: .3; margin-bottom: .5rem; }
    .t-text { color: #aaa; font-size: .88rem; line-height: 1.75; font-style: italic; margin-bottom: 1.2rem; }
    .t-author { display: flex; align-items: center; gap: .7rem; }
    .t-avatar {
      width: 36px; height: 36px;
      background: var(--red); display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: var(--white); font-size: .75rem; flex-shrink: 0;
    }
    .t-name { font-weight: 600; font-size: .86rem; }
    .t-date { color: var(--muted); font-size: .7rem; }

    /* ── WHY ── */
    #why {
      background: var(--black);
      display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center;
    }
    .why-visual { position: relative; aspect-ratio: 1; max-width: 400px; }
    .why-ring { position: absolute; inset: 0; border: 1px solid var(--border); border-radius: 50%; animation: spin 22s linear infinite; }
    .why-ring:nth-child(2) { inset: 11%; border-color: rgba(192,57,43,.18); animation-duration: 15s; animation-direction: reverse; }
    .why-ring:nth-child(3) { inset: 24%; border-color: rgba(192,57,43,.08); animation-duration: 9s; }
    .why-center {
      position: absolute; inset: 34%; background: var(--red); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-d); font-size: 1.8rem; font-weight: 700;
      color: var(--white);
    }
    .why-dot { position: absolute; width: 6px; height: 6px; background: var(--red); border-radius: 50%; }
    .why-dot:nth-child(5) { top: 6%; left: 46%; }
    .why-dot:nth-child(6) { top: 46%; right: 4%; }
    .why-dot:nth-child(7) { bottom: 8%; left: 15%; }
    .why-list { display: flex; flex-direction: column; gap: 1.6rem; margin-top: 2.2rem; }
    .why-item { display: flex; gap: 1rem; align-items: flex-start; }
    .why-num { font-family: var(--font-d); font-size: 1.8rem; font-weight: 700; color: var(--red); line-height: 1; min-width: 2rem; }
    .why-item-title { font-weight: 600; margin-bottom: .2rem; font-size: .93rem; }
    .why-item-desc { color: var(--muted); font-size: .86rem; line-height: 1.65; }

    /* ── CONTACT ── */
    #contact { background: var(--dark); position: relative; overflow: hidden; }
    #contact::before {
      content: '';
      position: absolute; top: -25%; left: 50%; transform: translateX(-50%);
      width: 650px; height: 500px;
      background: radial-gradient(circle, rgba(192,57,43,.05) 0%, transparent 70%);
      pointer-events: none;
    }
    .contact-layout {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;
      position: relative; z-index: 1;
    }
    .contact-info { padding-top: .5rem; }
    .contact-detail {
      display: flex; align-items: flex-start; gap: 1rem;
      margin-bottom: 1.8rem;
    }
    .contact-detail-icon {
      width: 38px; height: 38px; background: rgba(192,57,43,.12);
      border: 1px solid rgba(192,57,43,.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .contact-detail-label {
      font-size: .68rem; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--red); margin-bottom: .2rem;
    }
    .contact-detail-value { font-size: .95rem; font-weight: 500; color: var(--white); }
    .contact-detail-value a { color: inherit; text-decoration: none; }
    .contact-detail-value a:hover { color: var(--red); }
    .contact-detail-sub { font-size: .8rem; color: var(--muted); margin-top: .1rem; }

    .form-wrap { background: var(--card); border: 1px solid var(--border); padding: 2.3rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: .38rem; margin-bottom: .9rem; }
    .form-group label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--dark); border: 1px solid var(--border);
      color: var(--white); padding: .75rem .9rem;
      font-family: var(--font-b); font-size: .9rem;
      outline: none; transition: border-color .2s; width: 100%;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--red); }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .form-group select option { background: var(--dark); }
    .form-submit {
      width: 100%; margin-top: .4rem;
      background: var(--red); color: var(--white);
      border: none; padding: .95rem;
      font-family: var(--font-b); font-weight: 700;
      font-size: .9rem; letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer; transition: background .2s, transform .15s;
    }
    .form-submit:hover { background: var(--red2); transform: translateY(-1px); }
    .form-note { color: var(--muted); font-size: .73rem; margin-top: .7rem; text-align: center; }
    .form-success {
      display: none;
      background: rgba(192,57,43,.1); border: 1px solid rgba(192,57,43,.3);
      color: var(--red); padding: .9rem; text-align: center;
      font-weight: 600; margin-top: .8rem; font-size: .88rem;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--black); border-top: 1px solid var(--border);
      padding: 2.5rem 5%;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 1.5rem;
    }
    .footer-logo { font-family: var(--font-d); font-size: 1.1rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--white); }
    .footer-logo span { color: var(--red); }
    .footer-info { color: var(--muted); font-size: .78rem; line-height: 1.85; }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { color: var(--muted); text-decoration: none; font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; font-weight: 500; transition: color .2s; }
    .footer-links a:hover { color: var(--red); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity .6s ease, transform .6s ease; }
    .reveal.visible {
